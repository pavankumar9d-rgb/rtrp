<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECAP Student Portal</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>
    <div class="page-container">
        <header class="main-header" style="height: 100px; background: transparent;">
            <!-- Blank banner for ECAP Header -->
        </header>

        <div class="login-container">
            <!-- Admin Login Card -->
            <div class="login-card">
                <div class="login-card-header">Admin Login</div>
                <div class="login-card-body">
                    <form method="POST" action="{{ url_for('login') }}" id="adminLoginForm">
                        <input type="hidden" name="role" value="admin">
                        <div class="form-group">
                            <label for="adminUser">User Name :</label>
                            <input type="text" id="adminUser" name="username" required autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="adminPass">Password :</label>
                            <div class="password-group">
                                <input type="password" id="adminPass" name="password" required autocomplete="new-password">
                                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('adminPass', this)">
                                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                </button>
                            </div>
                        </div>
                        <div class="login-btn-container">
                            <button type="submit" id="adminLoginBtn" class="login-btn">LOGIN</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Student Login Card -->
            <div class="login-card">
                <div class="login-card-header">Student Login</div>
                <div class="login-card-body">
                    {% if error %}
                    <div class="alert-error">{{ error }}</div>
                    {% endif %}
                    <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                        <input type="hidden" name="role" value="student">
                        <div class="form-group">
                            <label for="stdUser">User Name :</label>
                            <input type="text" id="stdUser" name="username" required autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="stdPass">Password :</label>
                            <div class="password-group">
                                <input type="password" id="stdPass" name="password" required autocomplete="new-password">
                                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('stdPass', this)">
                                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                </button>
                            </div>
                        </div>
                        <div class="login-btn-container">
                            <button type="submit" id="studentLoginBtn" class="login-btn">LOGIN</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


    </div>
    <script>
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const eyeIcon = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
            const eyeOffIcon = '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = eyeOffIcon;
            } else {
                input.type = 'password';
                btn.innerHTML = eyeIcon;
            }
        }
    </script>
</body>

</html>
